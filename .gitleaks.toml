[extend]
useDefault = true

[allowlist]
description = "Generated, vendored, and lockfile paths"
paths = [
  '''node_modules/''',
  '''target/''',
  '''\.venv/''',
  '''dist/''',
  '''vendor/''',
  '''testdata/''',
  '''Cargo\.lock$''',
  '''pnpm-lock\.yaml$''',
  '''package-lock\.json$''',
  '''go\.sum$''',
  '''bindings/node/binding\.js$''',
]
