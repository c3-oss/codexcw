name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  quality:
    name: commit + docs + secrets
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4

      - name: Install Node tooling
        run: devbox run -- pnpm install --frozen-lockfile

      - name: Lint commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: devbox run -- pnpm exec commitlint --config commitlint.config.cjs --from "$BASE_SHA" --to "$HEAD_SHA"

      - name: Run quality gates
        env:
          # Lychee falls back to anonymous GitHub requests without this, which
          # are heavily rate-limited in CI.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: devbox run -- just quality

  go-test:
    name: go / tidy + vet + test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Cache Go modules and build
        uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ubuntu-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ubuntu-go-
      - name: Tidy check
        run: devbox run -- just go-tidy-check
      - name: Vet
        run: devbox run -- just go-vet
      - name: Test
        run: devbox run -- go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  go-lint:
    name: go / golangci-lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Run golangci-lint
        run: devbox run -- just go-lint

  go-security:
    name: go / gosec + govulncheck
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Static security analysis (gosec)
        run: devbox run -- just go-lint-sec
      - name: Vulnerability scan (govulncheck)
        run: devbox run -- just go-lint-vuln

  go-build:
    name: go / build / ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Cache Go modules and build
        uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ matrix.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ matrix.os }}-go-
      - name: Build
        run: devbox run -- just go-build

  rust:
    name: rust / fmt + clippy + test + audit
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2
      - name: Format check
        run: devbox run -- just rust-fmt-check
      - name: Clippy
        run: devbox run -- just rust-lint
      - name: Test
        run: devbox run -- just rust-test
      - name: Audit
        run: devbox run -- just rust-audit

  node:
    name: node / ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2
      - name: Build native addon
        run: devbox run -- just node-build
      - name: Test
        run: devbox run -- just node-test

  dotnet:
    name: dotnet / build + fmt + test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ubuntu-nuget-${{ hashFiles('dotnet/**/*.csproj', 'dotnet/Directory.Build.props') }}
          restore-keys: ubuntu-nuget-
      - name: Build
        run: devbox run -- just dotnet-build
      - name: Format check
        run: devbox run -- just dotnet-fmt-check
      - name: Test
        run: devbox run -- just dotnet-test
      - name: Verify package
        run: devbox run -- just dotnet-verify-pack

  dotnet-compat:
    name: dotnet / runtime matrix
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # net8.0 is the oldest published target; the devbox lane only ships
          # SDK 10, so this lane installs both runtimes and runs the suite on
          # each TFM.
          - os: ubuntu-latest
            runs-on: blacksmith-2vcpu-ubuntu-2404
          # The package has no OS restriction; Windows runs the build and the
          # platform-independent tests (process tests are Unix-only).
          - os: windows-latest
            runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ matrix.os }}-nuget-${{ hashFiles('dotnet/**/*.csproj', 'dotnet/Directory.Build.props') }}
          restore-keys: ${{ matrix.os }}-nuget-
      - name: Test (net8.0 and net10.0)
        run: dotnet test dotnet/Codexcw.slnx -p:TestAllFrameworks=true

  python:
    name: python / ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2
      - name: Build extension
        run: devbox run -- just py-build
      - name: Test
        run: devbox run -- just py-test
