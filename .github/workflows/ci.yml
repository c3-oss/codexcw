name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  quality:
    name: commit + docs + secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4

      - name: Install Node tooling
        run: devbox run -- pnpm install --frozen-lockfile

      - name: Lint commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: devbox run -- pnpm exec commitlint --config commitlint.config.cjs --from "$BASE_SHA" --to "$HEAD_SHA"

      - name: Run quality gates
        run: devbox run -- just quality

  go-test:
    name: go / tidy + vet + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Cache Go modules and build
        uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ubuntu-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ubuntu-go-
      - name: Tidy check
        run: devbox run -- just go-tidy-check
      - name: Vet
        run: devbox run -- just go-vet
      - name: Test
        run: devbox run -- go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  go-lint:
    name: go / golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Run golangci-lint
        run: devbox run -- just go-lint

  go-security:
    name: go / gosec + govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Static security analysis (gosec)
        run: devbox run -- just go-lint-sec
      - name: Vulnerability scan (govulncheck)
        run: devbox run -- just go-lint-vuln

  go-build:
    name: go / build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Cache Go modules and build
        uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/Library/Caches/go-build
          key: ${{ matrix.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ matrix.os }}-go-
      - name: Build
        run: devbox run -- just go-build

  rust:
    name: rust / fmt + clippy + test + audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2
      - name: Format check
        run: devbox run -- just rust-fmt-check
      - name: Clippy
        run: devbox run -- just rust-lint
      - name: Test
        run: devbox run -- just rust-test
      - name: Audit
        run: devbox run -- just rust-audit

  node:
    name: node / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2
      - name: Build native addon
        run: devbox run -- just node-build
      - name: Test
        run: devbox run -- just node-test

  python:
    name: python / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
          devbox-version: 0.17.4
      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2
      - name: Build extension
        run: devbox run -- just py-build
      - name: Test
        run: devbox run -- just py-test
