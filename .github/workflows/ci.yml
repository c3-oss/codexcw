name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  quality:
    name: commit + docs + secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Install Node tooling
        run: devbox run -- pnpm install --frozen-lockfile

      - name: Lint commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: devbox run -- pnpm exec commitlint --config commitlint.config.cjs --from "$BASE_SHA" --to "$HEAD_SHA"

      - name: Run quality gates
        run: devbox run -- just quality

  rust:
    name: fmt + clippy + test + audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: devbox run -- just fmt-check

      - name: Clippy
        run: devbox run -- just lint

      - name: Test
        run: devbox run -- just test

      - name: Audit
        run: devbox run -- just audit

  node:
    name: node / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2

      - name: Build native addon
        run: devbox run -- just build-node

      - name: Test
        run: devbox run -- just test-node

  python:
    name: python / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2

      - name: Build extension
        run: devbox run -- just build-py

      - name: Test
        run: devbox run -- just test-py
